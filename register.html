<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForumX | Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">ForumX</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="forum.html">Forum</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <h2>Create an Account</h2>
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" class="form-control" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" class="form-control" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" class="form-control" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" class="form-control" placeholder="Choose a password">
            </div>
            <button class="btn" onclick="handleRegister()">Register</button>
            <div id="reg-msg" class="message hidden"></div>
            <p style="margin-top: 20px;">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 ForumX. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
